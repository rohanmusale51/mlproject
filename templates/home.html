<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Exam Performance Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding-top: 50px;
    }
    .container {
      max-width: 600px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h1, h2 {
      text-align: center;
      color: #00796b;
    }
    .btn-primary {
      width: 100%;
      background-color: #00796b;
      border: none;
    }
    .btn-primary:hover {
      background-color: #004d40;
    }
    label {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 Student Exam Performance Indicator</h1>
    <hr>
    <form action="{{ url_for('predict_datapoint') }}" method="post">
      <h2>Prediction Form</h2>

      <div class="mb-3">
        <label>Gender</label>
        <select class="form-select" name="gender" required>
          <option selected disabled value="">Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Race or Ethnicity</label>
        <select class="form-select" name="ethnicity" required>
          <option selected disabled value="">Select Ethnicity</option>
          <option value="group A">Group A</option>
          <option value="group B">Group B</option>
          <option value="group C">Group C</option>
          <option value="group D">Group D</option>
          <option value="group E">Group E</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Parental Level of Education</label>
        <select class="form-select" name="parental_level_of_education" required>
          <option selected disabled value="">Select Parent Education</option>
          <option value="associate's degree">Associate's Degree</option>
          <option value="bachelor's degree">Bachelor's Degree</option>
          <option value="high school">High School</option>
          <option value="master's degree">Master's Degree</option>
          <option value="some college">Some College</option>
          <option value="some high school">Some High School</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Lunch Type</label>
        <select class="form-select" name="lunch" required>
          <option selected disabled value="">Select Lunch Type</option>
          <option value="free/reduced">Free/Reduced</option>
          <option value="standard">Standard</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Test Preparation Course</label>
        <select class="form-select" name="test_preparation_course" required>
          <option selected disabled value="">Select Course</option>
          <option value="none">None</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Writing Score (0–100)</label>
        <input type="number" class="form-control" name="writing_score" min="0" max="100" required>
      </div>

      <div class="mb-3">
        <label>Reading Score (0–100)</label>
        <input type="number" class="form-control" name="reading_score" min="0" max="100" required>
      </div>

      <button type="submit" class="btn btn-primary">Predict Your Math Score</button>
    </form>

    <h2 class="mt-4">Prediction Result: {{ results }}</h2>
  </div>
</body>
</html>
